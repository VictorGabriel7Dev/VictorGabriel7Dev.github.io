<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>404 — Página não encontrada · Victor Gabriel</title>
  <meta name="description" content="Página não encontrada — Victor Gabriel.">
  <meta name="keywords" content="Victor Gabriel Dev, Victor Gabriel Desenvolvedor, Victor Gabriel Python, Victor Gabriel Linux, Victor Gabriel IA, Victor Gabriel Software, Victor Gabriel Sistemas, Victor Gabriel Cibersegurança, Inovamind Dev">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#f5f5f7">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      min-height: 100%;
      background:
        radial-gradient(ellipse at 10% 20%, #c7e8ff 0%, transparent 50%),
        radial-gradient(ellipse at 90% 10%, #d4c5f9 0%, transparent 45%),
        radial-gradient(ellipse at 80% 80%, #ffd6e7 0%, transparent 50%),
        radial-gradient(ellipse at 20% 85%, #c3f4e0 0%, transparent 45%),
        radial-gradient(ellipse at 55% 50%, #fff0c2 0%, transparent 55%),
        #eaf0fb;
      background-attachment: fixed;
    }
    body {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 20px;
      line-height: 1.6;
      color: #24292e;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.90);
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(80, 80, 120, 0.08), 0 1px 4px rgba(80, 80, 120, 0.06);
      position: relative;
      overflow: hidden;
      width: 100%;
    }
    .box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(90deg, #7F77DD, #AFA9EC);
    }
    .code {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      color: #0366d6;
      letter-spacing: 0.05em;
      margin: 0;
    }
    h1 { font-size: 1.4em; margin: 0.6em 0 0.6em; }
    p { color: #586069; margin: 0 0 1.2em; }
    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    a.btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95em;
      background: #0366d6;
      color: #fff;
      border: 1px solid #0366d6;
    }
    a.btn.ghost { background: transparent; color: #0366d6; }
    a.btn:hover { filter: brightness(1.05); }
    footer { margin-top: 1.5em; font-size: 0.85em; color: #777; }
    footer a { color: #0366d6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <p class="code">404</p>
    <h1>Página não encontrada</h1>
    <p>O endereço acessado não existe ou foi movido. Confira o link ou volte para a página inicial.</p>
    <div class="actions">
      <a class="btn" href="/">Início</a>
      <a class="btn ghost" href="mailto:contato@victorgabriel.dev">Falar comigo</a>
    </div>
    <footer>Victor Gabriel · <a href="https://victorgabriel.dev/">victorgabriel.dev</a></footer>
  </div>
</body>
</html>
